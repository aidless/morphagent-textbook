name: build-book

# 在每次 push 到 main 和每个 PR 上自动构建 Jupyter Book
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jupyter-book sphinxcontrib.bibtex sphinx_inline_tabs sphinx_panels
          pip install myst-parser
          pip install sphinx

      - name: Build the book
        run: |
          jupyter-book build . --all --warningiserror

      - name: Upload _build/html as artifact
        uses: actions/upload-artifact@v4
        with:
          name: book-html
          path: _build/html/
          retention-days: 30

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_build/html
          cname: morphagent.example.com
